# ┌──────────────────────────────────────────────────────────────┐
# │  JoJo（ジョジョ）— Stand Master configuration                │
# │                                                            │
# │  JoJo Stand Personas:                                      │
# │    STAR PLATINUM     — Part 3 · Precision & direct exec    │
# │    CRAZY DIAMOND     — Part 4 · Restoration & recovery     │
# │    GOLD EXPERIENCE   — Part 5 · Sub-agent orchestration    │
# │    STONE FREE        — Part 6 · Decomposition & connection │
# │    TUSK              — Part 7 · Iterative deepening        │
# │    SOFT & WET        — Part 8 · Extraction & isolation     │
# │                                                            │
# │  Spawnable Stands (via Gold Experience):                   │
# │    THE WORLD          — Close-Range Power (in-process)     │
# │    HIEROPHANT GREEN   — Long-Range RAG    (subagent)       │
# │    HARVEST            — Colony parallel   (in-process)     │
# │    SHEER HEART ATTACK — Automatic bg      (subagent)       │
# └──────────────────────────────────────────────────────────────┘

llm:
  base_url: ${LLM_BASE_URL:-http://f15dtpai1:11517/v1}
  model: ${LLM_MODEL:-gpt-oss-120b}
  api_key: ${LLM_API_KEY:-EMPTY}
  models:
    default: gpt-oss-120b
    reasoning: qwen3_235B_A22B           # Used by THE WORLD for deep reasoning

embedding:
  api_base: ${EMBEDDING_API_BASE:-http://f15dtpai1:11434}
  model: ${EMBEDDING_MODEL:-nomic-embed-text}

smak:
  workspace_config: ./workspace_config.yaml

memory:
  storage_dir: ./agent_data/memory
  max_entries: 10000
  auto_memorize: true

mcp_servers:
  filesystem:
    command: python
    args: ["-m", "filesystem_server.server"]
    env:
      ROOT_DIR: ${WORKSPACE_ROOT:-.}

permissions:
  mode: ask
  allowed_tools: ["*"]
  denied_tools: []
  require_confirmation:
    - delete_file
    - write_file
    - run_terminal_command

heartbeat:
  enabled: true
  interval_seconds: 300

email:
  enabled: false

subagent:
  enabled: true
  mode: tmux
  max_concurrent: 3
  timeout_seconds: 600
  work_dir: ./agent_data/subagent_tasks/

session:
  max_history_tokens: 8000
  auto_summarize_after: 20
