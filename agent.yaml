# ┌──────────────────────────────────────────────────────┐
# │  JoJo（ジョジョ）— Stand Master                      │
# │                                                      │
# │  Stands:                                             │
# │    STAR PLATINUM      — Precision + Time Stop        │
# │    GOLD EXPERIENCE    — Life Giver (sub-agent spawn) │
# │    THE WORLD          — Time Stop (deep reasoning)   │
# │    HIEROPHANT GREEN   — Emerald Splash (RAG)         │
# │    HARVEST            — Colony (parallel)            │
# │    SHEER HEART ATTACK — Automatic (background)       │
# └──────────────────────────────────────────────────────┘

llm:
  base_url: ${LLM_BASE_URL:-http://f15dtpai1:11517/v1}
  model: ${LLM_MODEL:-gpt-oss-120b}
  api_key: ${LLM_API_KEY:-EMPTY}
  models:
    default: gpt-oss-120b
    reasoning: qwen3_235B_A22B           # Used by THE WORLD + Star Platinum Time Stop

embedding:
  api_base: ${EMBEDDING_API_BASE:-http://f15dtpai1:11434}
  model: ${EMBEDDING_MODEL:-nomic-embed-text}

smak:
  workspace_config: ./workspace_config.yaml

memory:
  storage_dir: ./agent_data/memory
  max_entries: 10000
  auto_memorize: true

mcp_servers:
  filesystem:
    command: python
    args: ["-m", "filesystem_server.server"]
    env:
      ROOT_DIR: ${WORKSPACE_ROOT:-.}

permissions:
  mode: ask
  allowed_tools: ["*"]
  denied_tools: []
  require_confirmation:
    - delete_file
    - write_file
    - run_terminal_command

heartbeat:
  enabled: true
  interval_seconds: 300

email:
  enabled: false

subagent:
  enabled: true
  mode: tmux
  max_concurrent: 3
  timeout_seconds: 600
  work_dir: ./agent_data/subagent_tasks/

session:
  max_history_tokens: 8000
  auto_summarize_after: 20
